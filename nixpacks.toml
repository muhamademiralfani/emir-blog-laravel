[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader", "npm install && npm run build"]

[phases.prestart]
cmds = ["touch database/database.sqlite", "php artisan migrate --force", "php artisan storage:link"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"