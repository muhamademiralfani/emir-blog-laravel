[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci"
]

# Di bagian prestart cmds
"php artisan migrate --force --seed --seeder=CategoryTagSeeder"

[phases.build]
cmds = [
    "npm run build"
]

[phases.prestart]
cmds = [
    "mkdir -p database",
    "touch database/database.sqlite",
    "php artisan migrate --force",
    # Baris sakti: bikin user lewat command line (pake kutip satu yang bener)
    "php artisan tinker --execute=\"\\App\\Models\\User::updateOrCreate(['email' => 'muhamademiralfani@gmail.com'], ['name' => 'Emir Admin', 'password' => bcrypt('admin123'), 'role' => 'admin'])\"",
    "php artisan storage:link",
    "php artisan config:cache"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public"