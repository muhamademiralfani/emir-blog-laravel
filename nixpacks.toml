[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs"]

[phases.install]
# Instalasi dependencies PHP & Node
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install"
]

[phases.build]
# Proses kompilasi aset Vite
cmds = [
    "npm run build"
]

[phases.prestart]
# Persiapan database dan sistem Laravel
cmds = [
    "mkdir -p database",
    "touch database/database.sqlite",
    "php artisan migrate --force",
    "php artisan storage:link",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php -S 0.0.0.0:$PORT -t public"